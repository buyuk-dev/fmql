name: Publish semantic

on:
  push:
    tags: ['semantic-v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Extract tag version and verify against pyproject
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#semantic-v}"
          pyproject_version=$(grep -E '^version\s*=\s*"' packages/fmql-semantic/pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag version ($tag_version) does not match packages/fmql-semantic/pyproject.toml version ($pyproject_version)"
            exit 1
          fi
          echo "Verified: publishing fmql-semantic $tag_version"

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        working-directory: packages/fmql-semantic
        run: python -m build --outdir ../../dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
